<!DOCTYPE html>
<html>
<head>
    <title>Relax and Fold</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="The references page of Oricentric">
        <meta name="author" content="Brandon Timothy P. Fernando & Rei Annica P. Francisco">
        <meta name="keywords" content="HTML, CSS, JavaScript, Web Development Oricentric, Origami, Paper Crafts" >
        <link rel="stylesheet" href="../styles.css">
        <link rel="icon" type="image/png" href="../assets/Oricentric_logo(transparent).png">
        <script src="../datahandling.js"></script>
        <script src="../navigation.js"></script>
        <script src="../preferences.js"></script>
        <script src="../relax.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #5e9975, #5895d1);
            font-family: 'Segoe UI', sans-serif;
            color: #161515;
            overflow: hidden;
            padding: 2rem;
        }

        .origami {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            position: absolute;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 1; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.5; }
        }

        .quotes {
            position: relative;
            z-index: 5;
            max-width: 700px;
            text-align: center;
            margin-top: 3rem;
        }

        #quoteDisplay {
            font-style: italic;
            font-size: 1.2rem;
            color: #f4f4f4;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .message {
            position: relative;
            z-index: 5;
            text-align: center;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
        }

        button {
            position: relative;
            z-index: 10;
            padding: 12px 25px;
            border: none;
            background: #556b2f;
            color: #fff;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 1.5rem;
            text-align: center;
        }

        button:hover {
            background: #617538;
            transform: translateY(-2px);
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .message { font-size: 1.2rem; }
            #quoteDisplay { font-size: 1rem; }
            .origami { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

    <div class="origami" style="top: 10%; left: 20%; animation-duration: 6s;"></div>
    <div class="origami" style="top: 30%; left: 70%; animation-duration: 12s;"></div>
    <div class="origami" style="top: 60%; left: 40%; animation-duration: 7s;"></div>
    <div class="origami" style="top: 80%; left: 15%; animation-duration: 10s;"></div>

    <p>Enjoy your folding session</p>

    <section class="quotes">
        <p id="quoteDisplay" ></p>
    </section>

    <audio id="bgAudio" loop></audio>

    <section id="buttons">

        <button id="musicToggle">Play Music</button> <br>

        <button onclick="goBack()">Back to Preferences</button>

    </section>

    <script>
        function goBack() {
            window.location.href = "Calm.html";
        }
        
         const quotes = [
            "You can’t use up creativity. The more you use, the more you have. - Angelou, M.",
            "Creativity takes courage. - Matisse, H.",
            "Success is to be measured not so much by the position that one has reached in life as by the obstacles which he has overcome. - Washington, B. T.",
            "Despite everything, it's still you! - Undertale"
        ];

        // --- Quote display function ---
        function quoteDisplayFunc(){
            const quoteDisplay = document.getElementById("quoteDisplay");
            if(quoteDisplay){
                const random = quotes[Math.floor(Math.random() * quotes.length)];
                quoteDisplay.textContent = random;
            }
        }

        setInterval(quoteDisplayFunc, 300000); // every 5 minutes
        quoteDisplayFunc();

        // --- Music Loader ---
        function getMusicFile(opt){
            switch(opt){
                case 'lofi': return '../lofi-chill.mp3';
                case 'ambiance': return '../ambiance-bird.wav';
                case 'classical': return '../classical-rave.wav'; //Nica what category is this idt theres any classical :sob:
                case 'ost': return '../ost-ut.mp3'; 
                case 'instrumental': return '../instrumental-beats.mp3';
                case 'none': return '';
                default: return '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
    const audio = document.getElementById('bgAudio');
    const musicBtn = document.getElementById('musicToggle');
    const prefs = JSON.parse(localStorage.getItem('userPreferences') || '{}');

    if(prefs.musicPreference && prefs.musicPreference !== 'none'){
        audio.src = getMusicFile(prefs.musicPreference);
        audio.volume = (prefs.volume || 50) / 100;
    }

    musicBtn.addEventListener('click', () => {
        if(audio.paused){
            audio.play();
            musicBtn.textContent = "Pause Music";
        } else {
            audio.pause();
            musicBtn.textContent = "Play Music";
        }
    });
});
    </script>
</body>
</html>
